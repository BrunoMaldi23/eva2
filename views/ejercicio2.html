<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1.2 - Objeto Persona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <!-- Botón volver con history -->
        <div class="mb-3">
            <button onclick="volverConHistory()" class="btn btn-secondary">← Volver al menú</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-success text-white text-center">
                <h3 class="mb-0">Ejercicio 1.2: Objeto Persona</h3>
                <small>THANOS, el Titan Loco</small>
            </div>
            <div class="card-body text-center">
                <!-- Imagen opcional de Thanos -->
                <div class="mb-3">
                    <img src="https://i.imgur.com/9jG7x8K.png" alt="Thanos" style="width: 150px;" 
                         onerror="this.src='https://via.placeholder.com/150x150?text=THANOS'">
                </div>
                
                <!-- Creación del objeto persona SEGÚN LO SOLICITADO -->
                <div class="alert alert-info">
                    <strong>📦 Objeto "persona" creado:</strong><br>
                    nombre: "THANOS" | edad: 140
                </div>
                
                <button id="btnSaludar" class="btn btn-success btn-lg px-5">👋 Saludar</button>
                
                <div id="mensajeSaludo" class="mt-4 p-3 bg-light rounded border" style="min-height: 80px;">
                    <span class="text-muted">Presiona el botón para saludar...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Crear el objeto "persona" exactamente como pide el enunciado
        const persona = {
            nombre: "THANOS",
            edad: 140
        };
        
        // 2. Función Saludar que recibe nombre y edad como parámetros
        // EXPLICACIÓN: La función recibe parámetros en lugar de usar this porque
        // el ejercicio pide explícitamente "recibiendo la función como parámetro 
        // la propiedad nombre y edad del objeto"
        function Saludar(nombre, edad) {
            // Retorna el string formateado
            return `Hola, soy ${nombre} y tengo ${edad} años`;
        }
        
        // 3. Evento del botón - llama a Saludar pasando las propiedades del objeto
        document.getElementById("btnSaludar").addEventListener("click", function() {
            const mensaje = Saludar(persona.nombre, persona.edad);
            const contenedor = document.getElementById("mensajeSaludo");
            
            // Mostrar con animación
            contenedor.innerHTML = `
                <div class="alert alert-success mb-0">
                    🎤 <strong>${mensaje}</strong> 🎤
                    <hr>
                    <small class="text-muted">¡Thanos ha llegado!</small>
                </div>
            `;
        });
    </script>
    
    <script src="../js/main.js"></script>
</body>
</html>
