<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1.2 - Objeto Persona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    
   <style>
        :root {
            --primary-color: #0f766e; /* Verde esmeralda oscuro */
            --secondary-color: #475569; /* Gris pizarra */
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            background: var(--bg-gradient) !important;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .content-wrapper {
            max-width: 650px;
            margin: 0 auto;
        }

        .custom-card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
        }

        .card-header-success {
            background-color: var(--primary-color) !important;
            color: #ffffff !important;
        }

        /* Botón volver - HOVER CON TONO ESMERALDA SUAVE */
        .btn-back {
            background-color: transparent;
            color: var(--secondary-color);
            border: 1px solid #cbd5e1;
            font-weight: 500;
            transition: all 0.2s ease;
            border-radius: 8px;
        }
        .btn-back:hover {
            background-color: #f0fdfa; /* Fondo menta muy claro */
            color: var(--primary-color); /* Texto esmeralda */
            border-color: #ccfbf1;
            transform: translateX(-3px);
        }

        .avatar-img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .object-badge {
            background-color: #f0fdfa;
            border: 1px solid #ccfbf1;
            color: #115e59;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        /* Botón Saludar - HOVER LUMINOSO (SE ACLARA) */
        .btn-action {
            background-color: var(--primary-color);
            border: none;
            color: white;
            font-weight: 500;
            transition: all 0.25s ease-in-out;
            border-radius: 8px;
        }
        .btn-action:hover {
            background-color: #0d9488; /* Verde menta más claro y encendido */
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25);
        }

        .saludo-container {
            background-color: #f8fafc;
            border: 1px dashed #e2e8f0;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="content-wrapper">
            
            <div class="mb-3 text-start">
                <button onclick="volverConHistory()" class="btn btn-back px-3 py-2">← Volver al menú</button>
            </div>

            <div class="card custom-card">
                <div class="card-header card-header-success text-center py-4">
                    <h3 class="h4 mb-1 fw-bold">Ejercicio 1.2: Objeto Persona</h3>
                    <p class="mb-0 small opacity-75" style="font-size: 0.85rem;">THANOS, el Titán Loco</p>
                </div>
                
                <div class="card-body p-4 text-center">
                    <div class="mb-4">
                        <img src="../img/thanos.jpg" alt="Thanos" class="avatar-img" 
                             onerror="this.src='https://via.placeholder.com/150x150?text=THANOS'">
                    </div>
                    
                    <div class="object-badge p-3 mb-4">
                        <span class="fw-semibold">📦 Objeto "persona" instanciado:</span>
                        <div class="mt-1 small font-monospace">
                            nombre: <span class="fw-bold">"THANOS"</span> | edad: <span class="fw-bold">140</span>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <button id="btnSaludar" class="btn btn-action btn-lg px-5 py-2.5 shadow-sm">👋 Saludar</button>
                    </div>
                    
                    <div>
                        <h6 class="text-start text-secondary fw-semibold mb-2 small">Resultado de la función:</h6>
                        <div id="mensajeSaludo" class="saludo-container rounded p-3">
                            <span class="text-muted small fst-italic">Presiona el botón para ejecutar Saludar()...</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. Crear el objeto "persona" exactamente como pide el enunciado
        const persona = {
            nombre: "THANOS",
            edad: 140
        };
        
        // 2. Función Saludar que recibe nombre y edad como parámetros
        function Saludar(nombre, edad) {
            return `Hola, soy ${nombre} y tengo ${edad} años.`;
        }
        
        // 3. Evento del botón
        document.getElementById("btnSaludar").addEventListener("click", function() {
            const mensaje = Saludar(persona.nombre, persona.edad);
            const contenedor = document.getElementById("mensajeSaludo");
            
            // Estilo inyectado moderno para la respuesta
            contenedor.style.borderStyle = "solid";
            contenedor.style.borderColor = "#b91c1c"; // Borde sutil
            contenedor.style.backgroundColor = "#fef2f2"; // Fondo suave para el saludo
            
            contenedor.innerHTML = `
                <div class="text-center w-100">
                    <span class="fs-5 d-block fw-bold text-danger mb-1">📢 ¡Thanos ha llegado!</span>
                    <strong class="text-dark h5 fw-semibold font-monospace">"${mensaje}"</strong>
                </div>
            `;
        });
    </script>
    
    <script src="../js/main.js"></script>
</body>
</html>
